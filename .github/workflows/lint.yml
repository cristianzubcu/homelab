name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible-lint yamllint

      - name: Run yamllint
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, truthy: disable}}" ansible/ prometheus/

      - name: Run ansible-lint
        run: |
          ansible-lint ansible/playbooks/*.yml
