name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install ansible-lint==24.10.0 ansible-core==2.17.7

      - name: Run ansible-lint
        run: ansible-lint ansible/playbooks/*.yml ansible/inventory.yml
