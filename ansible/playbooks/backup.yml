- name: Backup all configs
  hosts: mediaserver
  become: true
  vars_prompt:
    - name: docker_dir
      prompt: "Enter your homelab root directory (where docker-compose.yml lives)"
      default: "/mnt/c/Dockers"
      private: false
  tasks:
    - name: Set backup directory
      set_fact:
        backup_dir: "{{ docker_dir }}/backups/{{ ansible_date_time.date }}"

    - name: Create backup directory
      shell: "mkdir -p {{ backup_dir }}"
      register: mkdir_result
      failed_when:
        - mkdir_result.rc != 0
        - "'File exists' not in mkdir_result.stderr"

    - name: Backup service configs
      copy:
        src: "{{ item.src }}"
        dest: "{{ backup_dir }}/{{ item.name }}/"
        remote_src: true
      loop:
        - { src: "{{ docker_dir }}/radarr/config", name: "radarr" }
        - { src: "{{ docker_dir }}/sonarr/config", name: "sonarr" }
        - { src: "{{ docker_dir }}/jellyfin/config", name: "jellyfin" }
        - { src: "{{ docker_dir }}/prowlarr/data", name: "prowlarr" }
        - { src: "{{ docker_dir }}/homepage/config", name: "homepage" }
        - { src: "{{ docker_dir }}/qbittorrent/appdata", name: "qbittorrent" }
        - { src: "{{ docker_dir }}/bazarr/config", name: "bazarr" }