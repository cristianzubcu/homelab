- name: Deploy latest changes
  hosts: mediaserver
  vars_prompt:
    - name: docker_dir
      prompt: "Enter your homelab root directory (where docker-compose.yml lives)"
      default: "/mnt/c/Dockers"
      private: false
    - name: repo_dir
      prompt: "Enter repo clone path"
      default: "/mnt/c/Dockers/homelab"
      private: false
    - name: mullvad_private_key
      prompt: "Enter your Mullvad WireGuard private key"
      private: true
    - name: install_tailscale
      prompt: "Install Tailscale for remote access? (yes/no)"
      default: "yes"
      private: false
    - name: tailscale_authkey
      prompt: "Enter your Tailscale auth key (press Enter to skip if not installing Tailscale)"
      private: true
  tasks:
    - name: Pull latest from GitHub
      git:
        repo: https://github.com/cristianzubcu/homelab.git
        dest: "{{ repo_dir }}"
        version: main

    - name: Deploy docker-compose file
      template:
        src: "{{ repo_dir }}/docker-compose.yml.j2"
        dest: "{{ docker_dir }}/docker-compose.yml"

    - name: Deploy WireGuard config
      template:
        src: "{{ repo_dir }}/wireguard/wg0.conf.j2"
        dest: "{{ docker_dir }}/wireguard/config/wg_confs/wg0.conf"

    - name: Copy prometheus config
      copy:
        src: "{{ repo_dir }}/prometheus/prometheus.yml"
        dest: "{{ docker_dir }}/prometheus/config/prometheus.yml"
        remote_src: true

    - name: Copy homepage services config
      copy:
        src: "{{ repo_dir }}/homepage/services.yaml"
        dest: "{{ docker_dir }}/homepage/config/services.yaml"
        remote_src: true

    - name: Restart containers
      command: docker compose up -d
      args:
        chdir: "{{ docker_dir }}"
