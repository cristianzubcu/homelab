---
- name: Deploy latest changes
  hosts: mediaserver
  tasks:
    - name: Resolve docker_dir path
      ansible.builtin.set_fact:
        docker_dir: "{{ docker_dir | expanduser }}"

    - name: Set repo directory
      ansible.builtin.command: git rev-parse --show-toplevel
      args:
        chdir: "{{ playbook_dir }}"
      register: git_root
      changed_when: false

    - name: Set repo dir fact
      ansible.builtin.set_fact:
        repo_dir: "{{ git_root.stdout }}"

    - name: Detect server IP
      ansible.builtin.shell:
        cmd: >-
          powershell.exe -c "(Get-NetIPAddress -AddressFamily IPv4 |
          Where-Object { \$_.InterfaceAlias -match 'Ethernet|Wi-Fi'
          -and \$_.PrefixOrigin -eq 'Dhcp' }).IPAddress"
          2>/dev/null | tr -d '\r' | head -1
      register: detected_ip
      changed_when: false
      ignore_errors: true

    - name: Fallback IP detection for Linux
      ansible.builtin.shell:
        cmd: "ip route get 8.8.8.8 | grep -oP 'src \\K[0-9.]+'"
      register: fallback_ip
      changed_when: false
      when: detected_ip.stdout == ""
      ignore_errors: true

    - name: Set detected IP
      ansible.builtin.set_fact:
        auto_ip: >-
          {{ detected_ip.stdout if detected_ip.stdout != ''
          else (fallback_ip.stdout
          if fallback_ip is defined
          and fallback_ip.stdout is defined
          and fallback_ip.stdout != ''
          else 'localhost') }}

    - name: Set service host
      ansible.builtin.set_fact:
        service_host_effective: "{{ service_host | trim if (service_host | default('') | trim) != '' else auto_ip }}"

    - name: Prompt for Mullvad private key if missing
      ansible.builtin.pause:
        prompt: "Enter your Mullvad WireGuard private key"
        echo: false
      register: mullvad_private_key_prompt
      when: mullvad_private_key | default('') | trim == ''

    - name: Set Mullvad private key from prompt
      ansible.builtin.set_fact:
        mullvad_private_key: "{{ mullvad_private_key_prompt.user_input }}"
      when: mullvad_private_key | default('') | trim == ''

    - name: Prompt for Tailscale auth key if needed
      ansible.builtin.pause:
        prompt: "Enter your Tailscale auth key"
        echo: false
      register: tailscale_authkey_prompt
      when:
        - install_tailscale | bool
        - tailscale_authkey | default('') | trim == ''

    - name: Set Tailscale auth key from prompt
      ansible.builtin.set_fact:
        tailscale_authkey: "{{ tailscale_authkey_prompt.user_input }}"
      when:
        - install_tailscale | bool
        - tailscale_authkey | default('') | trim == ''

    - name: Deploy docker-compose file
      ansible.builtin.template:
        src: "{{ repo_dir }}/docker-compose.yml.j2"
        dest: "{{ docker_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Deploy WireGuard config
      ansible.builtin.template:
        src: "{{ repo_dir }}/wireguard/wg0.conf.j2"
        dest: "{{ docker_dir }}/wireguard/config/wg_confs/wg0.conf"
        mode: "0600"

    - name: Copy prometheus config
      ansible.builtin.copy:
        src: "{{ repo_dir }}/prometheus/prometheus.yml"
        dest: "{{ docker_dir }}/prometheus/config/prometheus.yml"
        mode: "0644"
        remote_src: true

    - name: Deploy homepage services config
      ansible.builtin.template:
        src: "{{ repo_dir }}/homepage/services.yaml.j2"
        dest: "{{ docker_dir }}/homepage/config/services.yaml"
        mode: "0644"

    - name: Restart containers
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ docker_dir }}"
      changed_when: true
