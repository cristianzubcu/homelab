---
- name: Deploy latest changes
  hosts: mediaserver
  vars_prompt:
    - name: docker_dir
      prompt: "Where is the homelab deployed?"
      default: "~/homelab-data"
      private: false
    - name: repo_dir
      prompt: "Enter repo clone path"
      default: "~/homelab"
      private: false
    - name: mullvad_private_key
      prompt: "Enter your Mullvad WireGuard private key"
      private: true
    - name: install_tailscale
      prompt: "Install Tailscale for remote access? (yes/no)"
      default: "no"
      private: false
    - name: tailscale_authkey
      prompt: "Enter your Tailscale auth key (press Enter to skip)"
      private: true
  tasks:
    - name: Resolve paths
      ansible.builtin.set_fact:
        docker_dir: "{{ docker_dir | expanduser }}"
        repo_dir: "{{ repo_dir | expanduser }}"

    - name: Detect server IP
      ansible.builtin.shell:
        cmd: >-
          powershell.exe -c "(Get-NetIPAddress -AddressFamily IPv4 |
          Where-Object { \$_.InterfaceAlias -match 'Ethernet|Wi-Fi'
          -and \$_.PrefixOrigin -eq 'Dhcp' }).IPAddress"
          2>/dev/null | tr -d '\r' | head -1
      register: detected_ip
      changed_when: false
      ignore_errors: true

    - name: Fallback IP detection for Linux
      ansible.builtin.shell:
        cmd: "ip route get 8.8.8.8 | grep -oP 'src \\K[0-9.]+'"
      register: fallback_ip
      changed_when: false
      when: detected_ip.stdout == ""
      ignore_errors: true

    - name: Set detected IP
      ansible.builtin.set_fact:
        auto_ip: >-
          {{ detected_ip.stdout if detected_ip.stdout != ''
          else (fallback_ip.stdout
          if fallback_ip is defined
          and fallback_ip.stdout is defined
          and fallback_ip.stdout != ''
          else 'localhost') }}

    - name: Confirm server IP
      ansible.builtin.pause:
        prompt: >-
          Detected server IP: {{ auto_ip }}.
          Press Enter to accept or type the correct IP
      register: ip_override

    - name: Set server IP
      ansible.builtin.set_fact:
        server_ip: >-
          {{ ip_override.user_input
          if ip_override.user_input != ''
          else auto_ip }}

    - name: Pull latest from GitHub
      ansible.builtin.git:
        repo: https://github.com/cristianzubcu/homelab.git
        dest: "{{ repo_dir }}"
        version: main

    - name: Create Caddy directories
      ansible.builtin.command: "mkdir -p {{ item }}"
      register: mkdir_result
      changed_when: mkdir_result.rc == 0
      failed_when:
        - mkdir_result.rc != 0
        - "'File exists' not in mkdir_result.stderr"
      loop:
        - "{{ docker_dir }}/caddy/config"
        - "{{ docker_dir }}/caddy/data"

    - name: Deploy docker-compose file
      ansible.builtin.template:
        src: "{{ repo_dir }}/docker-compose.yml.j2"
        dest: "{{ docker_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Deploy WireGuard config
      ansible.builtin.template:
        src: "{{ repo_dir }}/wireguard/wg0.conf.j2"
        dest: "{{ docker_dir }}/wireguard/config/wg_confs/wg0.conf"
        mode: "0600"

    - name: Copy prometheus config
      ansible.builtin.copy:
        src: "{{ repo_dir }}/prometheus/prometheus.yml"
        dest: "{{ docker_dir }}/prometheus/config/prometheus.yml"
        mode: "0644"
        remote_src: true

    - name: Deploy Caddy config
      ansible.builtin.template:
        src: "{{ repo_dir }}/caddy/Caddyfile.j2"
        dest: "{{ docker_dir }}/caddy/Caddyfile"
        mode: "0644"

    - name: Deploy homepage services config
      ansible.builtin.template:
        src: "{{ repo_dir }}/homepage/services.yaml.j2"
        dest: "{{ docker_dir }}/homepage/config/services.yaml"
        mode: "0644"

    - name: Restart containers
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ docker_dir }}"
      changed_when: true
