---
- name: Homelab setup
  hosts: mediaserver
  tasks:
    - name: Resolve docker_dir path
      ansible.builtin.set_fact:
        docker_dir: "{{ docker_dir | expanduser }}"

    - name: Set repo directory
      ansible.builtin.command: git rev-parse --show-toplevel
      args:
        chdir: "{{ playbook_dir }}"
      register: git_root
      changed_when: false

    - name: Set repo dir fact
      ansible.builtin.set_fact:
        repo_dir: "{{ git_root.stdout }}"

    - name: Detect server IP
      ansible.builtin.shell:
        cmd: >-
          powershell.exe -c "(Get-NetIPAddress -AddressFamily IPv4 |
          Where-Object { \$_.InterfaceAlias -match 'Ethernet|Wi-Fi'
          -and \$_.PrefixOrigin -eq 'Dhcp' }).IPAddress"
          2>/dev/null | tr -d '\r' | head -1
      register: detected_ip
      changed_when: false
      ignore_errors: true

    - name: Fallback IP detection for Linux
      ansible.builtin.shell:
        cmd: "ip route get 8.8.8.8 | grep -oP 'src \\K[0-9.]+'"
      register: fallback_ip
      changed_when: false
      when: detected_ip.stdout == ""
      ignore_errors: true

    - name: Set detected IP
      ansible.builtin.set_fact:
        auto_ip: >-
          {{ detected_ip.stdout if detected_ip.stdout != ''
          else (fallback_ip.stdout
          if fallback_ip is defined
          and fallback_ip.stdout is defined
          and fallback_ip.stdout != ''
          else 'localhost') }}

    - name: Set service host
      ansible.builtin.set_fact:
        service_host_effective: "{{ service_host | trim if (service_host | default('') | trim) != '' else auto_ip }}"

    - name: Prompt for Mullvad private key if missing
      ansible.builtin.pause:
        prompt: "Enter your Mullvad WireGuard private key"
        echo: false
      register: mullvad_private_key_prompt
      when: mullvad_private_key | default('') | trim == ''

    - name: Set Mullvad private key from prompt
      ansible.builtin.set_fact:
        mullvad_private_key: "{{ mullvad_private_key_prompt.user_input }}"
      when: mullvad_private_key | default('') | trim == ''

    - name: Prompt for Tailscale auth key if needed
      ansible.builtin.pause:
        prompt: "Enter your Tailscale auth key"
        echo: false
      register: tailscale_authkey_prompt
      when:
        - install_tailscale | bool
        - tailscale_authkey | default('') | trim == ''

    - name: Set Tailscale auth key from prompt
      ansible.builtin.set_fact:
        tailscale_authkey: "{{ tailscale_authkey_prompt.user_input }}"
      when:
        - install_tailscale | bool
        - tailscale_authkey | default('') | trim == ''

    - name: Create parent directories
      ansible.builtin.command: "mkdir -p {{ item }}"
      register: mkdir_result
      changed_when: mkdir_result.rc == 0
      failed_when:
        - mkdir_result.rc != 0
        - "'File exists' not in mkdir_result.stderr"
      loop:
        - "{{ docker_dir }}/media/movies"
        - "{{ docker_dir }}/media/tvshows"

    - name: Create service directories
      ansible.builtin.command: "mkdir -p {{ item }}"
      register: mkdir_result
      changed_when: mkdir_result.rc == 0
      failed_when:
        - mkdir_result.rc != 0
        - "'File exists' not in mkdir_result.stderr"
        - "'No such file or directory' not in mkdir_result.stderr"
      loop:
        - "{{ docker_dir }}/media/movies/_incoming"
        - "{{ docker_dir }}/media/tvshows/_incoming"
        - "{{ docker_dir }}/radarr/config"
        - "{{ docker_dir }}/sonarr/config"
        - "{{ docker_dir }}/qbittorrent/appdata"
        - "{{ docker_dir }}/prowlarr/data"
        - "{{ docker_dir }}/jellyfin/config"
        - "{{ docker_dir }}/bazarr/config"
        - "{{ docker_dir }}/wireguard/config/wg_confs"
        - "{{ docker_dir }}/prometheus/config"
        - "{{ docker_dir }}/prometheus/data"
        - "{{ docker_dir }}/grafana/data"
        - "{{ docker_dir }}/homepage/config"
        - "{{ docker_dir }}/portainer/data"

    - name: Create Tailscale directory
      ansible.builtin.command: "mkdir -p {{ docker_dir }}/tailscale/state"
      register: mkdir_result
      changed_when: mkdir_result.rc == 0
      failed_when:
        - mkdir_result.rc != 0
        - "'File exists' not in mkdir_result.stderr"
      when: install_tailscale | bool

    - name: Remove prometheus.yml if it is a directory
      ansible.builtin.command: "test -d {{ docker_dir }}/prometheus/config/prometheus.yml"
      register: prom_dir_check
      changed_when: false
      failed_when: false

    - name: Delete prometheus.yml directory
      ansible.builtin.file:
        path: "{{ docker_dir }}/prometheus/config/prometheus.yml"
        state: absent
      when: prom_dir_check.rc == 0

    - name: Deploy docker-compose file
      ansible.builtin.template:
        src: "{{ repo_dir }}/docker-compose.yml.j2"
        dest: "{{ docker_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Deploy WireGuard config
      ansible.builtin.template:
        src: "{{ repo_dir }}/wireguard/wg0.conf.j2"
        dest: "{{ docker_dir }}/wireguard/config/wg_confs/wg0.conf"
        mode: "0600"

    - name: Copy prometheus config
      ansible.builtin.copy:
        src: "{{ repo_dir }}/prometheus/prometheus.yml"
        dest: "{{ docker_dir }}/prometheus/config/prometheus.yml"
        mode: "0644"

    - name: Deploy homepage services config
      ansible.builtin.template:
        src: "{{ repo_dir }}/homepage/services.yaml.j2"
        dest: "{{ docker_dir }}/homepage/config/services.yaml"
        mode: "0644"

    - name: Start all containers
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ docker_dir }}"
      changed_when: true

    - name: Wait for qBittorrent to start
      ansible.builtin.pause:
        seconds: 10

    - name: Get qBittorrent temporary password
      ansible.builtin.shell:
        cmd: "docker logs qbittorrent 2>&1 | grep 'temporary password' | awk '{print $NF}'"
      register: qbit_password
      changed_when: false
      ignore_errors: true

    - name: Show summary
      ansible.builtin.debug:
        msg: |
          Homelab is running! Open these in your browser:
            Homepage:     http://{{ service_host_effective }}:3000
            Jellyfin:     http://{{ service_host_effective }}:8096
            Radarr:       http://{{ service_host_effective }}:7878
            Sonarr:       http://{{ service_host_effective }}:8989
            qBittorrent:  http://{{ service_host_effective }}:8080
            password:     {{ qbit_password.stdout | default('check docker logs qbittorrent') }}
            Prowlarr:     http://{{ service_host_effective }}:9696
            Bazarr:       http://{{ service_host_effective }}:6767
            Grafana:      http://{{ service_host_effective }}:3001
            Portainer:    https://{{ service_host_effective }}:9443
