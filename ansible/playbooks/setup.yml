- name: Homelab setup
  hosts: mediaserver
  vars_prompt:
    - name: docker_dir
      prompt: "Enter your homelab root directory (where the docker-compose.yml will live)"
      default: "."
      private: false

    - name: mullvad_private_key
      prompt: "Enter your Mullvad WireGuard private key"
      private: true

    - name: install_tailscale
      prompt: "Install Tailscale for remote access? (yes/no)"
      default: "yes"
      private: false

    - name: tailscale_authkey
      prompt: "Enter your Tailscale auth key (press Enter to skip if not installing Tailscale)"
      private: true
      
  tasks:
    - name: Set repo directory
      set_fact:
        repo_dir: "{{ playbook_dir }}/../.."

    - name: Create parent directories
      shell: "mkdir -p {{ item }}"
      register: mkdir_result
      failed_when:
        - mkdir_result.rc != 0
        - "'File exists' not in mkdir_result.stderr"
      loop:
        - "{{ docker_dir }}/media/movies"
        - "{{ docker_dir }}/media/tvshows"

    - name: Create child directories
      shell: "mkdir -p {{ item }}"
      register: mkdir_result
      failed_when:
        - mkdir_result.rc != 0
        - "'File exists' not in mkdir_result.stderr"
        - "'No such file or directory' not in mkdir_result.stderr"
      loop:
        - "{{ docker_dir }}/media/movies/_incoming"
        - "{{ docker_dir }}/media/tvshows/_incoming"
        - "{{ docker_dir }}/radarr/config"
        - "{{ docker_dir }}/sonarr/config"
        - "{{ docker_dir }}/qbittorrent/appdata"
        - "{{ docker_dir }}/prowlarr/data"
        - "{{ docker_dir }}/jellyfin/config"
        - "{{ docker_dir }}/bazarr/config"
        - "{{ docker_dir }}/wireguard/config/wg_confs"
        - "{{ docker_dir }}/prometheus/config"
        - "{{ docker_dir }}/prometheus/data"
        - "{{ docker_dir }}/grafana/data"
        - "{{ docker_dir }}/homepage/config"
        - "{{ docker_dir }}/portainer/data"

    - name: Create Tailscale directory
      shell: "mkdir -p {{ docker_dir }}/tailscale/state"
      register: mkdir_result
      failed_when:
        - mkdir_result.rc != 0
        - "'File exists' not in mkdir_result.stderr"
      when: install_tailscale == "yes"

    - name: Deploy docker-compose file
      template:
        src: "{{ repo_dir }}/docker-compose.yml.j2"
        dest: "{{ docker_dir }}/docker-compose.yml"

    - name: Deploy WireGuard config
      template:
        src: "{{ repo_dir }}/wireguard/wg0.conf.j2"
        dest: "{{ docker_dir }}/wireguard/config/wg_confs/wg0.conf"

    - name: Copy prometheus config
      copy:
        src: "{{ repo_dir }}/prometheus/prometheus.yml"
        dest: "{{ docker_dir }}/prometheus/config/prometheus.yml"

    - name: Copy homepage services config
      copy:
        src: "{{ repo_dir }}/homepage/services.yaml"
        dest: "{{ docker_dir }}/homepage/config/services.yaml"

    - name: Start all containers
      command: docker compose up -d
      args:
        chdir: "{{ docker_dir }}"
